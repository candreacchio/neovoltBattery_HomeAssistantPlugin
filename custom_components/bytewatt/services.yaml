# Service definitions for the Byte-Watt integration

force_reconnect:
  name: Force Reconnect
  description: >-
    Force the ByteWatt integration to reconnect to the API when it appears to be stuck.
    Use this service if your ByteWatt integration has stopped updating and shows stale data.
    This will reset the client connection, authenticate again, and refresh all sensor data.

health_check:
  name: Health Check
  description: >-
    Run a comprehensive health check on the ByteWatt integration.
    This will check network connectivity, authentication, and API accessibility.
    Results will be displayed in a persistent notification.
  fields:
    entry_id:
      name: Integration ID
      description: The ID of the specific integration to check (optional, checks all if not provided)
      example: "abcdef1234"
      required: false
      selector:
        text:

toggle_diagnostics:
  name: Toggle Diagnostics
  description: >-
    Enable or disable detailed diagnostic logging for the ByteWatt integration.
    When enabled, detailed logs will be collected about API operations, errors, and recovery attempts.
  fields:
    enable:
      name: Enable
      description: Set to true to enable diagnostics, false to disable (toggles current state if not provided)
      required: false
      example: true
      selector:
        boolean:
    entry_id:
      name: Integration ID
      description: The ID of the specific integration to modify (optional, affects all if not provided)
      example: "abcdef1234"
      required: false
      selector:
        text:

force_charge:
  name: Force Charge
  description: >-
    Start ByteWatt force charge using the integration's internal API client.
    If no system is specified, all detected ByteWatt systems are targeted.
  fields:
    limit:
      name: Charge Limit
      description: Target SOC limit percentage for force charge
      required: false
      example: 95
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    charge_power:
      name: Charge Power
      description: Optional charge power in watts for the targeted system(s)
      required: false
      example: 5000
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: "W"
    system_id:
      name: System ID
      description: Optional specific ByteWatt system ID to target
      required: false
      example: "z1fn6iB6DC37K2SAa2s"
      selector:
        text:
    sys_sn:
      name: Inverter Serial
      description: Optional inverter serial number for per-inverter targeting
      required: false
      example: "25000SP2B5W00253"
      selector:
        text:

stop_force_charge:
  name: Stop Force Charge
  description: >-
    Stop active ByteWatt force charge using the integration's internal API client.
    If no system is specified, all detected ByteWatt systems are targeted.
  fields:
    system_id:
      name: System ID
      description: Optional specific ByteWatt system ID to target
      required: false
      example: "z1fn6iB6DC37K2SAa2s"
      selector:
        text:
    sys_sn:
      name: Inverter Serial
      description: Optional inverter serial number associated with the system target
      required: false
      example: "25000SP2B5W00253"
      selector:
        text:

set_discharge_time:
  name: Set Discharge End Time
  description: Set the end time for battery discharge (legacy service)
  fields:
    end_discharge:
      name: End Discharge Time
      description: The time when battery discharge should end (format HH:MM)
      example: "23:00"
      required: true
      selector:
        time: {}

set_discharge_start_time:
  name: Set Discharge Start Time
  description: Set the start time for battery discharge
  fields:
    start_discharge:
      name: Start Discharge Time
      description: The time when battery discharge should start (format HH:MM)
      example: "16:00"
      required: true
      selector:
        time: {}

set_charge_start_time:
  name: Set Charge Start Time
  description: Set the start time for battery charging
  fields:
    start_charge:
      name: Start Charge Time
      description: The time when battery charging should start (format HH:MM)
      example: "14:30"
      required: true
      selector:
        time: {}

set_charge_end_time:
  name: Set Charge End Time
  description: Set the end time for battery charging
  fields:
    end_charge:
      name: End Charge Time
      description: The time when battery charging should end (format HH:MM)
      example: "16:00"
      required: true
      selector:
        time: {}

set_minimum_soc:
  name: Set Minimum SOC
  description: Set the minimum battery state of charge percentage
  fields:
    minimum_soc:
      name: Minimum SOC
      description: The minimum battery state of charge to maintain (1-100%)
      example: 10
      required: true
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"

set_charge_cap:
  name: Set Charge Cap
  description: Set the maximum battery charge cap percentage
  fields:
    charge_cap:
      name: Charge Cap
      description: The maximum battery charge cap to maintain (1-100%)
      example: 90
      required: true
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"

update_battery_settings:
  name: Update Battery Settings
  description: Update multiple battery settings at once
  fields:
    start_discharge:
      name: Start Discharge Time
      description: The time when battery discharge should start (format HH:MM)
      example: "16:00"
      required: false
      selector:
        time: {}
    end_discharge:
      name: End Discharge Time
      description: The time when battery discharge should end (format HH:MM)
      example: "23:00"
      required: false
      selector:
        time: {}
    start_charge:
      name: Start Charge Time
      description: The time when battery charging should start (format HH:MM)
      example: "14:30"
      required: false
      selector:
        time: {}
    end_charge:
      name: End Charge Time
      description: The time when battery charging should end (format HH:MM)
      example: "16:00"
      required: false
      selector:
        time: {}
    minimum_soc:
      name: Minimum SOC
      description: The minimum battery state of charge to maintain (1-100%)
      example: 10
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"

update_cycle_strategy:
  name: Update Cycle Strategy
  description: >-
    Update the active cycle-strategy charge/discharge schedule for host/follower style systems.
    Use this when the control variant is detected as cycle_strategy.
  fields:
    start_charge:
      name: Charge Start Time
      description: Primary cycle charge start time (HH:MM)
      example: "22:00"
      required: false
      selector:
        time: {}
    end_charge:
      name: Charge End Time
      description: Primary cycle charge end time (HH:MM)
      example: "22:30"
      required: false
      selector:
        time: {}
    charge_cap:
      name: Charge Cap
      description: Charge target/cap percentage for the cycle charge window
      example: 80
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    charge_power:
      name: Charge Power
      description: Primary cycle charge power in watts
      example: 5000
      required: false
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: "W"
    charge_enabled:
      name: Charge Enabled
      description: Enable or disable cycle-strategy charge control
      required: false
      selector:
        boolean: {}
    start_discharge:
      name: Discharge Start Time
      description: Primary cycle discharge start time (HH:MM)
      example: "16:00"
      required: false
      selector:
        time: {}
    end_discharge:
      name: Discharge End Time
      description: Primary cycle discharge end time (HH:MM)
      example: "07:15"
      required: false
      selector:
        time: {}
    minimum_soc:
      name: Minimum SOC
      description: Minimum battery SOC for the cycle strategy
      example: 10
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    discharge_power:
      name: Discharge Power
      description: Primary cycle discharge power in watts
      example: 5000
      required: false
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: "W"
    discharge_enabled:
      name: Discharge Enabled
      description: Enable or disable cycle-strategy discharge control
      required: false
      selector:
        boolean: {}

set_cycle_day_schedule:
  name: Set Cycle Day Schedule
  description: >-
    Replace the current day-based cycle strategy with explicit charge and/or discharge
    window lists. Intended for forecast-driven rolling optimiser control.
  fields:
    charge_windows:
      name: Charge windows JSON
      description: JSON array of charge window objects with beginTime/endTime/chargeLimit/chargePower
      example: >-
        [{"beginTime":"22:00","endTime":"22:15","chargeLimit":80,"chargePower":5000,"sort":1,"weeks":[7,1,2,3,4,5,6],"feedMode":0,"equipGroupId":0,"feedPower":0}]
      required: false
      selector:
        text:
          multiline: true
    discharge_windows:
      name: Discharge windows JSON
      description: JSON array of discharge window objects with beginTime/endTime/chargeLimit/chargePower
      example: >-
        [{"beginTime":"16:00","endTime":"16:15","chargeLimit":15,"chargePower":5000,"sort":1,"weeks":[7,1,2,3,4,5,6],"feedMode":0,"equipGroupId":0,"feedPower":0}]
      required: false
      selector:
        text:
          multiline: true
    minimum_soc:
      name: Minimum SOC
      description: Default discharge reserve SOC for generated windows
      example: 15
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    charge_cap:
      name: Charge Cap
      description: Default charge cap for generated windows
      example: 80
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    charge_power:
      name: Charge Power
      description: Default charge power in watts
      example: 5000
      required: false
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: "W"
    discharge_power:
      name: Discharge Power
      description: Default discharge power in watts
      example: 5000
      required: false
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: "W"
